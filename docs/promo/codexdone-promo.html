<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CodexDone Promo</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
      background: #eef3f5;
      color: #152126;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #eef3f5;
    }

    .canvas {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #eef3f5;
    }

    .canvas::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 38%;
      height: 100%;
      background: #dbe6ea;
      pointer-events: none;
    }

    .brand,
    .screens,
    .footnote {
      position: absolute;
      z-index: 1;
    }

    .brand {
      left: 6.5%;
      top: 9%;
      width: 32%;
    }

    .mark {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      color: #087f5b;
      font-size: 24px;
      font-weight: 700;
    }

    .mark-icon {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 50%;
      background: #0ca678;
      color: white;
      font-size: 28px;
      line-height: 1;
    }

    h1 {
      margin: 0;
      max-width: 700px;
      font-size: 84px;
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 30px 0 0;
      max-width: 500px;
      font-size: 30px;
      font-weight: 650;
      line-height: 1.35;
    }

    .description {
      margin: 20px 0 0;
      max-width: 600px;
      color: #52636b;
      font-size: 22px;
      line-height: 1.55;
    }

    .screens {
      inset: 0;
    }

    .settings-shot,
    .menu-shot {
      position: absolute;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 24px 34px rgba(22, 41, 49, 0.18));
    }

    .settings-shot {
      right: -4%;
      bottom: -5%;
      width: 68%;
    }

    .menu-shot {
      left: 8%;
      bottom: -1%;
      width: 22%;
      filter: drop-shadow(0 22px 30px rgba(22, 41, 49, 0.24));
    }

    .footnote {
      right: 4.5%;
      top: 5%;
      padding-left: 18px;
      border-left: 4px solid #1677df;
      color: #52636b;
      font-size: 18px;
      font-weight: 600;
    }

    body.social .brand {
      left: 5.5%;
      top: 12%;
      width: 37%;
    }

    body.social .mark {
      margin-bottom: 22px;
      font-size: 19px;
    }

    body.social .mark-icon {
      width: 34px;
      height: 34px;
      font-size: 23px;
    }

    body.social h1 {
      font-size: 67px;
    }

    body.social .subtitle {
      margin-top: 22px;
      font-size: 26px;
    }

    body.social .description {
      margin-top: 14px;
      max-width: 470px;
      font-size: 18px;
    }

    body.social .settings-shot {
      right: -10%;
      bottom: -13%;
      width: 68%;
    }

    body.social .menu-shot {
      left: 39%;
      bottom: -18%;
      width: 25%;
    }

    body.social .footnote {
      display: none;
    }
  </style>
</head>
<body>
  <main class="canvas" aria-label="CodexDone product preview">
    <section class="brand">
      <div class="mark">
        <span class="mark-icon" aria-hidden="true">✓</span>
        <span>macOS 原生任务完成通知器</span>
      </div>
      <h1>CodexDone</h1>
      <p class="subtitle">让每个 Codex 任务完成时，都能及时找到你。</p>
      <p class="description">本机语音、桌面通知、提示音与 iPhone 推送，统一由菜单栏管理。</p>
    </section>

    <section class="screens" aria-label="CodexDone macOS screenshots">
      <img class="settings-shot" src="../images/codexdone-settings.png" alt="CodexDone settings window">
      <img class="menu-shot" src="../images/codexdone-menu-bar.png" alt="CodexDone menu bar popover">
    </section>

    <div class="footnote">Voice · Desktop · iPhone</div>
  </main>

  <script>
    const format = new URLSearchParams(window.location.search).get("format");
    document.body.classList.toggle("social", format === "social");
  </script>
</body>
</html>
